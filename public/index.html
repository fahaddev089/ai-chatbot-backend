<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chatbot</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: #2a2a3e;
      --accent: #7c6bff;
      --accent2: #ff6b9d;
      --text: #e8e8f0;
      --text-muted: #6b6b8a;
      --user-bubble: #1e1e30;
      --ai-bubble: #161622;
      --success: #4ade80;
    }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 0;
    }

    .sidebar-header {
      padding: 0 20px 20px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .logo span {
      font-weight: 400;
      font-size: 11px;
      display: block;
      color: var(--text-muted);
      -webkit-text-fill-color: var(--text-muted);
      margin-top: 2px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .new-chat-btn {
      margin: 16px 20px 0;
      padding: 10px 16px;
      background: linear-gradient(135deg, var(--accent), #5a4fff);
      border: none;
      border-radius: 10px;
      color: white;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      width: calc(100% - 40px);
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }

    .new-chat-btn:hover { opacity: 0.85; transform: translateY(-1px); }

    .conversations-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 10px;
    }

    .conversations-list::-webkit-scrollbar { width: 4px; }
    .conversations-list::-webkit-scrollbar-track { background: transparent; }
    .conversations-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .conv-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      color: var(--text-muted);
      transition: all 0.15s;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conv-item:hover { background: var(--surface2); color: var(--text); }
    .conv-item.active { background: var(--surface2); color: var(--text); border-left: 2px solid var(--accent); }

    .conv-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      margin-right: 8px;
    }

    /* Main */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
    }

    .topbar-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
    }

    .model-badge {
      padding: 4px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.5px;
    }

    /* Messages */
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .messages-container::-webkit-scrollbar { width: 4px; }
    .messages-container::-webkit-scrollbar-track { background: transparent; }
    .messages-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--text-muted);
      text-align: center;
    }

    .empty-icon {
      width: 64px; height: 64px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    .empty-state h2 {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      color: var(--text);
      font-weight: 700;
    }

    .empty-state p { font-size: 13px; max-width: 300px; line-height: 1.6; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .suggestion-chip {
      padding: 8px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text-muted);
    }

    .suggestion-chip:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Message bubbles */
    .message {
      display: flex;
      gap: 12px;
      animation: fadeUp 0.3s ease;
      max-width: 800px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; align-self: flex-end; }
    .message.assistant { align-self: flex-start; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .message.user .avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }

    .message.assistant .avatar {
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 13.5px;
      line-height: 1.7;
      max-width: 600px;
    }

    .message.user .bubble {
      background: var(--user-bubble);
      border: 1px solid var(--border);
      border-top-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
    }

    .bubble img {
      max-width: 280px;
      border-radius: 8px;
      margin-bottom: 8px;
      display: block;
    }

    .bubble-time {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 14px 16px;
    }

    .typing-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: typing 1.2s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
      30% { opacity: 1; transform: scale(1); }
    }

    /* Input area */
    .input-area {
      padding: 20px 28px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .image-preview {
      margin-bottom: 10px;
      position: relative;
      display: inline-block;
    }

    .image-preview img {
      height: 60px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .image-preview .remove-img {
      position: absolute;
      top: -6px; right: -6px;
      width: 18px; height: 18px;
      background: var(--accent2);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .input-box {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px;
      transition: border-color 0.2s;
    }

    .input-box:focus-within { border-color: var(--accent); }

    .input-box textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13.5px;
      resize: none;
      max-height: 120px;
      line-height: 1.6;
    }

    .input-box textarea::placeholder { color: var(--text-muted); }

    .input-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .icon-btn {
      width: 34px; height: 34px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.2s;
    }

    .icon-btn:hover { border-color: var(--accent); color: var(--accent); }

    .send-btn {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--accent), #5a4fff);
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.2s;
    }

    .send-btn:hover { opacity: 0.85; transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .input-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
      text-align: center;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      color: var(--text);
      z-index: 1000;
      animation: slideIn 0.3s ease;
      display: none;
    }

    .toast.show { display: block; }
    .toast.error { border-color: var(--accent2); color: var(--accent2); }
    .toast.success { border-color: var(--success); color: var(--success); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #fileInput { display: none; }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo">NeuralChat <span>powered by GPT-4o</span></div>
    </div>
    <button class="new-chat-btn" onclick="newConversation()">+ New Chat</button>
    <div class="conversations-list" id="convList">
      <!-- Conversations will appear here -->
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="chatTitle">Select or start a conversation</div>
      <div class="model-badge">GPT-4o Vision</div>
    </div>

    <div class="messages-container" id="messagesContainer">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🤖</div>
        <h2>What can I help with?</h2>
        <p>Ask me anything — text, images, code, analysis. Powered by GPT-4o.</p>
        <div class="suggestions">
          <div class="suggestion-chip" onclick="suggest('Explain quantum computing simply')">Explain quantum computing</div>
          <div class="suggestion-chip" onclick="suggest('Write a Python function to sort a list')">Write Python code</div>
          <div class="suggestion-chip" onclick="suggest('Analyze this image for me')">Analyze an image</div>
          <div class="suggestion-chip" onclick="suggest('What are the latest AI trends?')">AI trends</div>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="image-preview" id="imagePreview" style="display:none">
        <img id="previewImg" src="" alt="preview"/>
        <button class="remove-img" onclick="removeImage()">×</button>
      </div>
      <div class="input-box">
        <textarea
          id="messageInput"
          placeholder="Message NeuralChat..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <div class="input-actions">
          <button class="icon-btn" onclick="document.getElementById('fileInput').click()" title="Upload image">🖼</button>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">➤</button>
        </div>
      </div>
      <div class="input-hint">Enter to send · Shift+Enter for new line · Images supported</div>
    </div>
  </div>

  <input type="file" id="fileInput" accept="image/*" onchange="handleImageUpload(event)"/>
  <div class="toast" id="toast"></div>

  <script>
    // =====================
    // CONFIG — Laravel API
    // =====================
    const API_BASE = 'http://127.0.0.1:8000/api';

    let currentConversationId = null;
    let selectedImageFile = null;
    let isLoading = false;

    // =====================
    // INIT
    // =====================
    window.onload = () => {
      loadConversations();
    };

    // =====================
    // CONVERSATIONS
    // =====================
    async function loadConversations() {
      try {
        const res = await fetch(`${API_BASE}/conversations`);
        const conversations = await res.json();
        renderConversations(conversations);
      } catch (e) {
        // API not connected yet — show demo mode
      }
    }

    function renderConversations(conversations) {
      const list = document.getElementById('convList');
      list.innerHTML = '';
      conversations.forEach(conv => {
        const item = document.createElement('div');
        item.className = `conv-item ${conv.id === currentConversationId ? 'active' : ''}`;
        item.innerHTML = `<span class="conv-dot"></span>${conv.title}`;
        item.onclick = () => loadConversation(conv.id, conv.title);
        list.appendChild(item);
      });
    }

    async function newConversation() {
      try {
        const res = await fetch(`${API_BASE}/conversations`, { method: 'POST' });
        const conv = await res.json();
        currentConversationId = conv.id;
        document.getElementById('chatTitle').textContent = conv.title;
        clearMessages();
        loadConversations();
        showToast('New chat started!', 'success');
      } catch (e) {
        showToast('Cannot connect to Laravel API. Is php artisan serve running?', 'error');
      }
    }

    async function loadConversation(id, title) {
      currentConversationId = id;
      document.getElementById('chatTitle').textContent = title;
      clearMessages();

      try {
        const res = await fetch(`${API_BASE}/conversations/${id}/messages`);
        const data = await res.json();
        data.messages.forEach(msg => {
          appendMessage(msg.role, msg.content, msg.image_path ? `http://127.0.0.1:8000/storage/${msg.image_path}` : null);
        });
        loadConversations();
      } catch (e) {
        showToast('Failed to load messages', 'error');
      }
    }

    // =====================
    // MESSAGES
    // =====================
    async function sendMessage() {
      if (isLoading) return;
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if (!text && !selectedImageFile) return;
      if (!currentConversationId) {
        showToast('Please start a new chat first!', 'error');
        return;
      }

      // Show user message
      appendMessage('user', text, selectedImageFile ? URL.createObjectURL(selectedImageFile) : null);
      input.value = '';
      autoResize(input);

      // Show typing
      const typingId = showTyping();
      isLoading = true;
      document.getElementById('sendBtn').disabled = true;

      // Build form data
      const formData = new FormData();
      formData.append('message', text || 'Analyze this image');
      if (selectedImageFile) formData.append('image', selectedImageFile);

      removeImage();

      try {
        const res = await fetch(`${API_BASE}/conversations/${currentConversationId}/messages`, {
          method: 'POST',
          body: formData,
        });

        const data = await res.json();
        removeTyping(typingId);
        appendMessage('assistant', data.reply);
      } catch (e) {
        removeTyping(typingId);
        appendMessage('assistant', '⚠️ Could not reach Laravel API. Make sure `php artisan serve` is running on port 8000.');
      }

      isLoading = false;
      document.getElementById('sendBtn').disabled = false;
    }

    function appendMessage(role, content, imageUrl = null) {
      const empty = document.getElementById('emptyState');
      if (empty) empty.remove();

      const container = document.getElementById('messagesContainer');
      const msg = document.createElement('div');
      msg.className = `message ${role}`;

      const avatar = role === 'user' ? '👤' : '🤖';
      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      msg.innerHTML = `
        <div class="avatar">${avatar}</div>
        <div class="bubble">
          ${imageUrl ? `<img src="${imageUrl}" alt="uploaded"/>` : ''}
          ${content ? `<div>${formatContent(content)}</div>` : ''}
          <div class="bubble-time">${time}</div>
        </div>
      `;

      container.appendChild(msg);
      container.scrollTop = container.scrollHeight;
    }

    function formatContent(text) {
      return text
        .replace(/```([\s\S]*?)```/g, '<pre style="background:#0a0a0f;padding:12px;border-radius:8px;overflow-x:auto;margin:8px 0;font-size:12px;border:1px solid #2a2a3e">$1</pre>')
        .replace(/`([^`]+)`/g, '<code style="background:#0a0a0f;padding:2px 6px;border-radius:4px;font-size:12px">$1</code>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');
    }

    function showTyping() {
      const container = document.getElementById('messagesContainer');
      const id = 'typing-' + Date.now();
      const el = document.createElement('div');
      el.className = 'message assistant';
      el.id = id;
      el.innerHTML = `
        <div class="avatar">🤖</div>
        <div class="bubble">
          <div class="typing-indicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
          </div>
        </div>
      `;
      container.appendChild(el);
      container.scrollTop = container.scrollHeight;
      return id;
    }

    function removeTyping(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    function clearMessages() {
      const container = document.getElementById('messagesContainer');
      container.innerHTML = '';
    }

    // =====================
    // IMAGE HANDLING
    // =====================
    function handleImageUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      selectedImageFile = file;
      const preview = document.getElementById('imagePreview');
      const img = document.getElementById('previewImg');
      img.src = URL.createObjectURL(file);
      preview.style.display = 'inline-block';
    }

    function removeImage() {
      selectedImageFile = null;
      document.getElementById('imagePreview').style.display = 'none';
      document.getElementById('previewImg').src = '';
      document.getElementById('fileInput').value = '';
    }

    // =====================
    // HELPERS
    // =====================
    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function suggest(text) {
      document.getElementById('messageInput').value = text;
      if (!currentConversationId) {
        showToast('Start a new chat first!', 'error');
        return;
      }
      sendMessage();
    }

    function showToast(msg, type = '') {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = `toast show ${type}`;
      setTimeout(() => toast.className = 'toast', 3000);
    }
  </script>
</body>
</html>
